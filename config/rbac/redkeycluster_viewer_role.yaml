# This rule is not used by the project redkeyoperator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to redkey.inditex.dev resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: redkeyoperator
    app.kubernetes.io/managed-by: kustomize
  name: redkeycluster-viewer-role
rules:
- apiGroups:
  - redkey.inditex.dev
  resources:
  - redkeyclusters
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - redkey.inditex.dev
  resources:
  - redkeyclusters/status
  verbs:
  - get
