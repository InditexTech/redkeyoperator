# This rule is not used by the project redkeyoperator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the redkey.inditex.dev.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: redkeyoperator
    app.kubernetes.io/managed-by: kustomize
  name: redkeycluster-editor-role
rules:
- apiGroups:
  - redkey.inditex.dev
  resources:
  - redkeyclusters
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - redkey.inditex.dev
  resources:
  - redkeyclusters/status
  verbs:
  - get
