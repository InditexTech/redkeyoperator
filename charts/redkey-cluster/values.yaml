# RedkeyCluster name (defaults to release name)
nameOverride: ""

primaries: 3
replicasPerPrimary: 0
ephemeral: true
purgeKeysOnRebalance: true
image: redis:8-bookworm

# Storage (only for non-ephemeral clusters)
storage: ""
storageClassName: ""
accessModes:
  - ReadWriteOnce

# deletePVC: false
# backup: false

labels:
  team: a-team
  custom: custom-label

config: |
  maxmemory 90mb
  maxmemory-samples 5
  maxmemory-policy allkeys-lru
  protected-mode no
  appendonly no
  save ""

resources:
  limits:
    cpu: 100m
    memory: 128Mi

robin:
  image: ghcr.io/inditextech/redkey-robin:0.1.0
  imagePullPolicy: Always
  resources:
    requests:
      cpu: 500m
      memory: 100Mi
    limits:
      cpu: 1
      memory: 200Mi
  config:
    reconciler:
      intervalSeconds: 30
      operationCleanUpIntervalSeconds: 30
    cluster:
      healthProbePeriodSeconds: 60
      healingTimeSeconds: 60
      maxRetries: 10
      backOff: 10
    metrics:
      intervalSeconds: 60
      redisInfoKeys:
        - keyspace_hits
        - evicted_keys
        - connected_clients
        - total_commands_processed
        - keyspace_misses
        - expired_keys
        - redis_version
        - used_memory_rss
        - maxmemory
        - used_cpu_sys
        - used_cpu_sys_children
        - used_cpu_user
        - used_cpu_user_children
        - total_net_input_bytes
        - total_net_output_bytes
        - aof_base_size
        - aof_current_size
        - mem_aof_buffer

# Post-install hook that waits for the RedkeyCluster to be Ready.
# All RBAC resources are auto-created and auto-cleaned by Helm hooks.
waitReady:
  enabled: false
  image: bitnami/kubectl:latest
  timeout: "300s"
  backoffLimit: 3
