{{ if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "redkey-operator.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redkey-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  - coordination.k8s.io
  resources:
  - configmaps
  - leases
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "redkey-operator.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redkey-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "redkey-operator.fullname" . }}-leader-election
subjects:
- kind: ServiceAccount
  name: {{ include "redkey-operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "redkey-operator.fullname" . }}-manager
  labels:
    {{- include "redkey-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - pods
  - services
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - configmaps
  - services
  verbs:
  - create
  - update
  - delete
  - get
  - list
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
- apiGroups:
  - ""
  resources:
  - persistentvolumeclaims
  verbs:
  - get
  - list
  - watch
  - delete
  - deletecollection
- apiGroups:
  - apps
  resources:
  - deployments
  - statefulsets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - policy
  resources:
  - poddisruptionbudgets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - redkey.inditex.dev
  resources:
  - redkeyclusters
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - redkey.inditex.dev
  resources:
  - redkeyclusters/finalizers
  verbs:
  - update
- apiGroups:
  - redkey.inditex.dev
  resources:
  - redkeyclusters/status
  verbs:
  - get
  - patch
  - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "redkey-operator.fullname" . }}-manager
  labels:
    {{- include "redkey-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "redkey-operator.fullname" . }}-manager
subjects:
- kind: ServiceAccount
  name: {{ include "redkey-operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "redkey-operator.fullname" . }}-editor
  labels:
    rbac.authorization.k8s.io/aggregate-to-admin: "true"
    {{- include "redkey-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - redkey.inditex.dev
  resources:
  - redkeyclusters
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - redkey.inditex.dev
  resources:
  - redkeyclusters/status
  verbs:
  - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "redkey-operator.fullname" . }}-viewer
  labels:
    rbac.authorization.k8s.io/aggregate-to-view: "true"
    {{- include "redkey-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - redkey.inditex.dev
  resources:
  - redkeyclusters
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - redkey.inditex.dev
  resources:
  - redkeyclusters/status
  verbs:
  - get
{{- end }}
