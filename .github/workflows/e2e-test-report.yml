name: E2E test report
permissions:
  contents: read
  actions: read
  checks: write

on:
  workflow_run:
    workflows:
      - E2E tests
    types:
      - completed

jobs:
  publish-report:
    if: ${{ github.event.workflow_run.conclusion != 'cancelled' }}
    runs-on: ubuntu-latest

    steps:
      - name: Publish E2E test report
        if: ${{ !cancelled() }}
        uses: dorny/test-reporter@v3
        with:
          artifact: e2e-test-reports
          name: E2E test results
          path: '**/e2e-report.xml'
          reporter: java-junit
          fail-on-error: 'false'
          fail-on-empty: 'false'
          use-actions-summary: 'true'
          report-title: E2E tests